<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warung Bu AMI (Online)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        button, .cursor-pointer { touch-action: manipulation; will-change: transform, opacity; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        /* Animasi Loading */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #059669; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased select-none pb-20 md:pb-6">

    <div id="loading-screen" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center gap-2">
        <div class="loader"></div>
        <p class="text-xs font-bold text-slate-600 animate-pulse">Menghubungkan ke server Warung...</p>
    </div>

    <header class="bg-gradient-to-r from-emerald-700 to-teal-800 text-white shadow-md sticky top-0 z-40 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-cloud text-amber-300 text-sm animate-bounce"></i>
                <span class="font-black tracking-wider text-lg">Warung Bu AMI <span class="text-[10px] bg-emerald-900 px-1.5 py-0.5 rounded text-emerald-300 border border-emerald-600 font-normal">ONLINE</span></span>
            </div>
            <nav class="hidden md:flex items-center gap-1 text-xs font-bold">
                <button onclick="switchTab('utama')" id="nav-pc-utama" class="px-3 py-1.5 rounded-lg bg-emerald-800 text-white"><i class="fa-solid fa-users mr-1"></i>Daftar Nama</button>
                <button onclick="switchTab('kasir')" id="nav-pc-kasir" class="px-3 py-1.5 rounded-lg text-emerald-100 hover:bg-emerald-800 hidden"><i class="fa-solid fa-basket-shopping mr-1"></i>Isi Porsi</button>
                <button onclick="switchTab('menu')" id="nav-pc-menu" class="px-3 py-1.5 rounded-lg text-emerald-100 hover:bg-emerald-800"><i class="fa-solid fa-boxes-stacked mr-1"></i>Atur Menu</button>
                <button onclick="switchTab('rekap')" id="nav-pc-rekap" class="px-3 py-1.5 rounded-lg text-emerald-100 hover:bg-emerald-800"><i class="fa-solid fa-receipt mr-1"></i>Buku Rekap</button>
            </nav>
        </div>
    </header>

    <main class="p-2 md:p-6 max-w-6xl mx-auto">
        <section id="page-utama" class="page-section">
            <div class="mb-4 bg-white p-3 rounded-xl shadow-xs border border-slate-200 flex flex-col md:flex-row gap-2 justify-between items-center">
                <h2 class="text-sm font-black text-slate-700 uppercase tracking-wider self-start md:self-center"><i class="fa-solid fa-address-book text-emerald-600 mr-1"></i> Pilih Pelanggan</h2>
                <div class="relative w-full md:w-72">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fa-solid fa-magnifying-glass text-sm"></i></span>
                    <input type="text" id="search-nama" oninput="jalankanPencarianNama()" placeholder="Cari nama pelanggan..." class="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg bg-slate-50 text-xs focus:outline-none font-bold">
                </div>
            </div>
            <div id="grid-nama-utama" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>

            <div class="mt-6 bg-white border border-slate-200 rounded-xl p-3 shadow-xs grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="p-2 bg-slate-50 rounded-lg border text-[11px]">
                    <label class="block font-bold text-slate-700 mb-1">Tambah Nama Baru:</label>
                    <div class="flex gap-1">
                        <input type="text" id="input-nama-baru" placeholder="Tulis nama..." class="px-2 py-1 border rounded bg-white flex-1 outline-none font-bold">
                        <button onclick="tambahNamaManual()" class="px-2 py-1 bg-emerald-600 text-white font-bold rounded">Tambah</button>
                    </div>
                </div>
                <div class="p-2 bg-slate-50 rounded-lg border text-[11px]">
                    <label class="block font-bold text-slate-700 mb-1">Hapus Nama Pelanggan:</label>
                    <div class="flex gap-1">
                        <select id="select-hapus-nama" class="px-1.5 py-1 border rounded bg-white flex-1 outline-none font-bold"></select>
                        <button onclick="hapusNamaManual()" class="px-2 py-1 bg-rose-600 text-white font-bold rounded">Hapus</button>
                    </div>
                </div>
                <div class="p-2 bg-slate-50 rounded-lg border text-[11px]">
                    <label class="block font-bold text-slate-700 mb-1">Atur Posisi Urutan:</label>
                    <div class="flex gap-1">
                        <select id="select-pindah-nama" class="px-1.5 py-1 border rounded bg-white flex-1 outline-none font-bold"></select>
                        <button onclick="geserUrutanNama('atas')" class="px-2 py-1 bg-slate-700 text-white rounded"><i class="fa-solid fa-arrow-up"></i></button>
                        <button onclick="geserUrutanNama('bawah')" class="px-2 py-1 bg-slate-700 text-white rounded"><i class="fa-solid fa-arrow-down"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-kasir" class="page-section hidden mb-12">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-start">
                <div class="bg-white border-2 border-slate-900 rounded-xl p-3 shadow-md space-y-3 relative">
                    <div class="flex justify-between items-start border-b pb-2">
                        <div>
                            <span class="text-[10px] font-bold text-emerald-600 uppercase block">Nota Pembeli</span>
                            <h2 class="text-xl font-black text-slate-900" id="nama-terpilih-txt">-</h2>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-slate-400 block uppercase">Saldo Lama</span>
                            <span id="saldo-utang-txt" class="font-bold text-sm text-slate-700">Rp 0</span>
                        </div>
                    </div>
                    <div id="mini-keranjang-list" class="space-y-1 max-h-40 overflow-y-auto pr-0.5 text-xs"></div>
                    <div class="border-t pt-2 flex items-center justify-between bg-slate-50 -mx-3 -mb-3 p-2.5 rounded-b-lg">
                        <div>
                            <span id="total-items-txt" class="text-[9px] block text-slate-500 font-bold">0 Porsi</span>
                            <span id="total-txt" class="text-lg font-black text-emerald-700">Rp 0</span>
                        </div>
                        <div class="flex gap-1 items-center">
                            <button onclick="switchTab('utama')" class="px-2 py-1.5 bg-slate-200 text-slate-700 text-[10px] font-bold rounded-md uppercase">Batal</button>
                            <button onclick="konfirmasiMasukUtang()" class="px-3 py-1.5 bg-emerald-600 text-white font-black text-[10px] uppercase tracking-wide rounded-md flex items-center gap-1 shadow-xs">Simpan Bon <i class="fa-solid fa-circle-check"></i></button>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-2 space-y-2">
                    <div class="bg-white p-2 rounded-xl shadow-xs border flex flex-col sm:flex-row gap-2 items-center w-full">
                        <div class="relative w-full sm:w-56 flex-shrink-0">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-slate-400"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
                            <input type="text" id="search-menu-kasir" oninput="renderKasirMenu()" placeholder="Cari menu warung..." class="w-full pl-8 pr-2 py-1.5 border border-slate-200 rounded-md bg-slate-50 text-xs focus:outline-none font-bold">
                        </div>
                        <div class="flex gap-0.5 overflow-x-auto w-full whitespace-nowrap scrollbar-none" id="kategori-container">
                            <button onclick="filterKategori('Makanan')" id="btn-kat-Makanan" class="cat-btn px-3 py-1.5 rounded bg-slate-800 text-white text-xs font-black">Makanan</button>
                            <button onclick="filterKategori('Minuman')" id="btn-kat-Minuman" class="cat-btn px-3 py-1.5 rounded bg-slate-200 text-slate-700 text-xs font-black">Minuman</button>
                            <button onclick="filterKategori('Rokok')" id="btn-kat-Rokok" class="cat-btn px-3 py-1.5 rounded bg-slate-200 text-slate-700 text-xs font-black">Rokok</button>
                            <button onclick="filterKategori('Jajan')" id="btn-kat-Jajan" class="cat-btn px-3 py-1.5 rounded bg-slate-200 text-slate-700 text-xs font-black">Jajan</button>
                            <button onclick="filterKategori('Semua')" id="btn-kat-Semua" class="cat-btn px-3 py-1.5 rounded bg-slate-200 text-slate-700 text-xs font-black ml-auto">Semua</button>
                        </div>
                    </div>
                    <div id="grid-kasir-menu" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-[55vh] md:max-h-[65vh] overflow-y-auto p-0.5"></div>
                </div>
            </div>
        </section>

        <section id="page-menu" class="page-section hidden">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-sm font-black text-slate-900">Atur Daftar Menu</h1>
                <button onclick="bukaModalMenu()" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg font-bold text-[11px] uppercase shadow">+ Tambah Baru</button>
            </div>
            <div class="flex border-b mb-2 bg-white p-1 rounded-t-lg gap-1 overflow-x-auto">
                <button onclick="switchKategoriKelola('Makanan')" id="tab-kelola-Makanan" class="tab-kelola px-3 py-1.5 font-bold text-xs rounded bg-emerald-600 text-white">Makanan</button>
                <button onclick="switchKategoriKelola('Minuman')" id="tab-kelola-Minuman" class="tab-kelola px-3 py-1.5 font-bold text-xs rounded text-slate-600">Minuman</button>
                <button onclick="switchKategoriKelola('Rokok')" id="tab-kelola-Rokok" class="tab-kelola px-3 py-1.5 font-bold text-xs rounded text-slate-600">Rokok</button>
                <button onclick="switchKategoriKelola('Jajan')" id="tab-kelola-Jajan" class="tab-kelola px-3 py-1.5 font-bold text-xs rounded text-slate-600">Jajan</button>
            </div>
            <div class="bg-white rounded-xl border overflow-hidden">
                <div id="list-menu-kelola-hp" class="divide-y text-xs"></div>
            </div>
        </section>

        <section id="page-rekap" class="page-section hidden">
            <div class="bg-slate-900 text-white p-3 rounded-xl flex justify-between items-center shadow mb-3">
                <div>
                    <h1 class="text-xs font-bold">Total Uang Luar (Piutang)</h1>
                    <p class="text-[9px] text-slate-400">Total semua bon berjalan pelanggan</p>
                </div>
                <span id="total-utang-warung" class="text-base font-black text-emerald-400">Rp 0</span>
            </div>
            <div class="space-y-2" id="container-rekap-urutan-utama"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-6xl mx-auto bg-slate-900 border-t border-slate-800 shadow-2xl z-40 flex justify-around p-1 text-center text-white rounded-t-xl md:hidden">
        <button onclick="switchTab('utama')" id="btn-utama" class="tab-btn flex-1 py-1.5 text-emerald-400 font-bold flex flex-col items-center"><i class="fa-solid fa-users text-sm"></i><span class="text-[9px] tracking-wider mt-0.5">Nama</span></button>
        <button onclick="switchTab('kasir')" id="btn-kasir" class="tab-btn flex-1 py-1.5 text-slate-400 font-bold flex flex-col items-center hidden"><i class="fa-solid fa-basket-shopping text-sm"></i><span class="text-[9px] tracking-wider mt-0.5">Isi Porsi</span></button>
        <button onclick="switchTab('menu')" id="btn-menu" class="tab-btn flex-1 py-1.5 text-slate-400 font-bold flex flex-col items-center"><i class="fa-solid fa-boxes-stacked text-sm"></i><span class="text-[9px] tracking-wider mt-0.5">Menu</span></button>
        <button onclick="switchTab('rekap')" id="btn-rekap" class="tab-btn flex-1 py-1.5 text-slate-400 font-bold flex flex-col items-center"><i class="fa-solid fa-receipt text-sm"></i><span class="text-[9px] tracking-wider mt-0.5">Rekap</span></button>
    </nav>

    <div id="modal-menu" class="fixed inset-0 bg-slate-900/70 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-sm rounded-xl shadow-xl overflow-hidden border">
            <div class="p-2 border-b flex justify-between items-center bg-slate-50">
                <h3 id="modal-menu-title" class="font-bold text-xs text-slate-800">Tambah Item</h3>
                <button onclick="tutupModalMenu()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="form-menu" onsubmit="simpanMenu(event)" class="p-3 space-y-2 text-xs">
                <input type="hidden" id="menu-id">
                <div>
                    <label class="block font-bold text-slate-600 mb-0.5">Nama Barang</label>
                    <input type="text" id="menu-nama" required class="w-full px-2.5 py-1.5 border rounded-lg outline-none font-bold">
                </div>
                <div>
                    <label class="block font-bold text-slate-600 mb-0.5">Kategori</label>
                    <select id="menu-kategori" class="w-full px-2.5 py-1.5 border rounded-lg bg-white outline-none font-bold">
                        <option value="Makanan">Makanan</option>
                        <option value="Minuman">Minuman</option>
                        <option value="Rokok">Rokok</option>
                        <option value="Jajan">Jajan</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold text-slate-600 mb-0.5">Harga Jual (Rp)</label>
                    <input type="number" id="menu-harga" required min="0" class="w-full px-2.5 py-1.5 border rounded-lg outline-none font-bold">
                </div>
                <div class="flex justify-end gap-1.5 pt-2 border-t">
                    <button type="button" onclick="tutupModalMenu()" class="px-3 py-1 border rounded text-slate-600">Batal</button>
                    <button type="submit" class="px-4 py-1 bg-emerald-600 text-white rounded font-bold">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-detail-rekap" class="fixed inset-0 bg-slate-900/70 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-md rounded-xl shadow-xl overflow-hidden border flex flex-col max-h-[80vh]">
            <div class="p-3 border-b flex justify-between items-center bg-slate-50">
                <h3 id="modal-rekap-title" class="font-extrabold text-sm text-slate-800">Detail Riwayat Bon</h3>
                <button onclick="tutupModalRekap()" class="text-slate-400 p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="modal-rekap-body" class="p-4 overflow-y-auto space-y-3 text-xs"></div>
            <div class="p-3 bg-slate-50 border-t flex justify-between items-center">
                <button onclick="lunasiUtangPelanggan()" class="px-4 py-2 bg-green-600 text-white font-bold rounded-lg text-xs uppercase shadow-sm">✓ Lunasi Semua</button>
                <button onclick="tutupModalRekap()" class="px-4 py-2 border rounded-lg font-bold text-xs text-slate-600">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ALAMAT DATABASE FIREBASE WARUNG BU AMI
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://warungbuami-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        
        // Inisialisasi Koneksi ke Cloud
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // PENGAMAN 4 DETIK: Jika database menggantung/lambat, paksa buka halaman utama
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                console.log("Firebase lambat merespons, memaksa masuk...");
                loadingScreen.classList.add('hidden');
                renderHalamanUtama();
            }
        }, 4000);

        const listNamaAwal = ["P. Yana", "Ki Adun", "Wahyu", "Tedi", "Arif", "Saeful", "Ncep", "IPan", "Arya", "Sandi", "Endang ucing", "Rahmat", "Konsumsi", "P. Kodok", "Nugi", "P. Oking", "Ruşdiono", "UJang", "Andi P", "Agung", "Ahmad", "Faris", "Akbar", "Korina", "Angga"];
        const paletWarnaWarni = ["bg-amber-100 text-amber-900 border-amber-300", "bg-sky-100 text-sky-900 border-sky-300", "bg-emerald-100 text-emerald-900 border-emerald-300", "bg-rose-100 text-rose-900 border-rose-300", "bg-purple-100 text-purple-900 border-purple-300", "bg-orange-100 text-orange-900 border-orange-300", "bg-lime-100 text-lime-900 border-lime-300"];

        let bukuUtang = [];
        let riwayatGlobalBarang = [];
        let daftarMenu = [];

        let namaTerpilih = null, kategoriAktif = 'Makanan', kategoriKelolaAktif = 'Makanan', keranjangPorsi = {}, targetNamaRekap = null;

        function formatRupiah(angka) { return 'Rp ' + parseInt(angka).toLocaleString('id-ID'); }
        
        // FUNGSI SINKRONISASI: Upload data ke Cloud Server
        function kirimDataKeCloud() {
            db.ref('warung_bu_ami/bukuUtang').set(bukuUtang);
            db.ref('warung_bu_ami/daftarMenu').set(daftarMenu);
            db.ref('warung_bu_ami/riwayatGlobalBarang').set(riwayatGlobalBarang);
        }

        // FUNGSI SINKRONISASI: Dengar perubahan dari HP/Device lain secara Live
        db.ref('warung_bu_ami').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                bukuUtang = data.bukuUtang || [];
                daftarMenu = data.daftarMenu || [];
                riwayatGlobalBarang = data.riwayatGlobalBarang || [];
            } else {
                // Jika database baru pertama kali dibuat dan kosong, isi dengan template bawaan
                bukuUtang = listNamaAwal.map(n => ({ nama: n, totalUtang: 0 }));
                daftarMenu = [
                    { id: 1, nama: 'Nasi Goreng', kategori: 'Makanan', harga: 12000 },
                    { id: 2, nama: 'Indomie Telur', kategori: 'Makanan', harga: 8000 },
                    { id: 3, nama: 'Kopi Kapal Api', kategori: 'Minuman', harga: 4000 },
                    { id: 4, nama: 'Es Teh Manis', kategori: 'Minuman', harga: 3000 },
                    { id: 5, nama: 'Sampoerna Mild', kategori: 'Rokok', harga: 35000 },
                    { id: 6, nama: 'Garam Filter', kategori: 'Rokok', harga: 24000 },
                    { id: 7, nama: 'Krupuk Kaleng', kategori: 'Jajan', harga: 1000 },
                    { id: 8, nama: 'Chitato', kategori: 'Jajan', harga: 2500 }
                ];
                kirimDataKeCloud();
            }

            // Segarkan tampilan layar saat data dari server masuk
            renderHalamanUtama();
            rekapDropdownOpsiNama();
            if(!document.getElementById('page-menu').classList.contains('hidden')) renderTabelMenu();
            if(!document.getElementById('page-rekap').classList.contains('hidden')) renderRekapUbahUrutanUtama();
            
            // Hilangkan layar loading
            document.getElementById('loading-screen').classList.add('hidden');
        });

        function switchTab(targetPage) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${targetPage}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.replace('text-emerald-400', 'text-slate-400'));
            if(document.getElementById(`btn-${targetPage}`)) document.getElementById(`btn-${targetPage}`).classList.replace('text-slate-400', 'text-emerald-400');
            if(targetPage === 'utama') { renderHalamanUtama(); rekapDropdownOpsiNama(); }
            if(targetPage === 'kasir') { renderKasirMenu(); renderKeranjangPorsi(); }
            if(targetPage === 'menu') renderTabelMenu();
            if(targetPage === 'rekap') renderRekapUbahUrutanUtama();
            window.scrollTo(0, 0);
        }

        function jalankanPencarianNama() { renderHalamanUtama(); }

        function renderHalamanUtama() {
            const grid = document.getElementById('grid-nama-utama');
            const keyword = document.getElementById('search-nama').value.toLowerCase();
            grid.innerHTML = '';
            bukuUtang.filter(p => p.nama.toLowerCase().includes(keyword)).forEach((p, index) => {
                grid.innerHTML += `
                    <button onclick="pilihDanBukaMenu('${p.nama}')" class="${paletWarnaWarni[index % paletWarnaWarni.length]} p-3 rounded-xl shadow-sm border-2 flex items-center justify-between h-16 text-left active:scale-95 transition-all">
                        <span class="font-black text-xl truncate tracking-wide">${p.nama}</span>
                        <i class="fa-solid fa-chevron-right text-xs opacity-70"></i>
                    </button>`;
            });
        }

        function rekapDropdownOpsiNama() {
            const sh = document.getElementById('select-hapus-nama'), sp = document.getElementById('select-pindah-nama');
            sh.innerHTML = sp.innerHTML = '<option value="">-- Pilih --</option>';
            bukuUtang.forEach(p => { sh.innerHTML += `<option value="${p.nama}">${p.nama}</option>`; sp.innerHTML += `<option value="${p.nama}">${p.nama}</option>`; });
        }

        function tambahNamaManual() {
            const val = document.getElementById('input-nama-baru').value.trim();
            if (!val || bukuUtang.find(p => p.nama.toLowerCase() === val.toLowerCase())) return;
            bukuUtang.push({ nama: val, totalUtang: 0 }); kirimDataKeCloud(); document.getElementById('input-nama-baru').value = '';
        }

        function hapusNamaManual() {
            const name = document.getElementById('select-hapus-nama').value; if (!name) return;
            if(confirm(`Hapus seluruh data nama "${name}"?`)) {
                bukuUtang = bukuUtang.filter(p => p.nama !== name); kirimDataKeCloud();
            }
        }

        function geserUrutanNama(arah) {
            const name = document.getElementById('select-pindah-nama').value; if(!name) return;
            const idx = bukuUtang.findIndex(p => p.nama === name); let nIdx = arah === 'atas' ? idx - 1 : idx + 1;
            if(nIdx < 0 || nIdx >= bukuUtang.length) return;
            [bukuUtang[idx], bukuUtang[nIdx]] = [bukuUtang[nIdx], bukuUtang[idx]]; kirimDataKeCloud();
            setTimeout(() => { document.getElementById('select-pindah-nama').value = name; }, 100);
        }

        function pilihDanBukaMenu(nama) {
            namaTerpilih = nama; const user = bukuUtang.find(u => u.nama === nama);
            document.getElementById('nama-terpilih-txt').innerText = nama; document.getElementById('saldo-utang-txt').innerText = formatRupiah(user.totalUtang);
            keranjangPorsi = {}; filterKategori('Makanan'); document.getElementById('btn-kasir').classList.remove('hidden'); switchTab('kasir');
        }

        function filterKategori(kat) {
            kategoriAktif = kat; document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('bg-slate-800', 'bg-slate-200'));
            document.getElementById(`btn-kat-${kat}`).classList.replace('bg-slate-200', 'bg-slate-800'); renderKasirMenu();
        }

        function renderKasirMenu() {
            const grid = document.getElementById('grid-kasir-menu'); grid.innerHTML = '';
            const keyword = (document.getElementById('search-menu-kasir').value || '').toLowerCase();
            daftarMenu.filter(m => (kategoriAktif === 'Semua' || m.kategori === kategoriAktif) && m.nama.toLowerCase().includes(keyword)).forEach(m => {
                const qty = keranjangPorsi[m.id] ? keranjangPorsi[m.id].qty : 0;
                grid.innerHTML += `
                    <div class="p-3 rounded-xl border flex justify-between items-center bg-white">
                        <div><h4 class="font-black text-slate-900">${m.nama}</h4><span class="text-sm text-emerald-700 font-bold">${formatRupiah(m.harga)}</span></div>
                        <div class="flex items-center border rounded-lg p-0.5 bg-slate-50">
                            <button onclick="gantiQtyLangsung(${m.id}, -1)" class="w-8 h-8 font-bold">-</button>
                            <span class="w-6 text-center font-bold">${qty}</span>
                            <button onclick="gantiQtyLangsung(${m.id}, 1)" class="w-8 h-8 font-bold">+</button>
                        </div>
                    </div>`;
            });
        }

        function gantiQtyLangsung(id, delta) {
            if (keranjangPorsi[id]) { keranjangPorsi[id].qty += delta; if (keranjangPorsi[id].qty <= 0) delete keranjangPorsi[id]; }
            else if (delta > 0) { keranjangPorsi[id] = { ...daftarMenu.find(m => m.id === id), qty: 1 }; }
            renderKasirMenu(); renderKeranjangPorsi();
        }

        function renderKeranjangPorsi() {
            const container = document.getElementById('mini-keranjang-list'); container.innerHTML = '';
            let total = 0, items = 0;
            Object.values(keranjangPorsi).forEach(item => {
                total += item.harga * item.qty; items += item.qty;
                container.innerHTML += `<div class="bg-slate-100 p-1 rounded flex justify-between"><span>${item.nama} x${item.qty}</span><span>${formatRupiah(item.harga*item.qty)}</span></div>`;
            });
            document.getElementById('total-txt').innerText = formatRupiah(total); document.getElementById('total-items-txt').innerText = `${items} Porsi`;
        }

        function konfirmasiMasukUtang() {
            const items = Object.values(keranjangPorsi); if (items.length === 0) return;
            const user = bukuUtang.find(u => u.nama === namaTerpilih); let total = 0;
            const tgl = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) + ' - ' + new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            items.forEach(i => total += i.harga * i.qty); user.totalUtang += total;
            riwayatGlobalBarang.unshift({ idTransaksi: Date.now().toString(), tanggal: tgl, pembeli: namaTerpilih, listMenu: items, nominal: total });
            kirimDataKeCloud(); keranjangPorsi = {}; namaTerpilih = null; document.getElementById('btn-kasir').classList.add('hidden'); switchTab('utama');
            alert('Bon utang berhasil disimpan!');
        }

        function switchKategoriKelola(kat) { kategoriKelolaAktif = kat; renderTabelMenu(); }
        function renderTabelMenu() {
            const c = document.getElementById('list-menu-kelola-hp'); c.innerHTML = '';
            daftarMenu.filter(m => m.kategori === kategoriKelolaAktif).forEach(m => {
                c.innerHTML += `<div class="p-3 flex justify-between bg-white border-b"><span>${m.nama} - <b>${formatRupiah(m.harga)}</b></span><button onclick="hapusMenu(${m.id})" class="text-rose-600 px-2"><i class="fa-solid fa-trash"></i></button></div>`;
            });
        }

        function bukaModalMenu() { document.getElementById('modal-menu').classList.remove('hidden'); }
        function tutupModalMenu() { document.getElementById('modal-menu').classList.add('hidden'); }
        
        function simpanMenu(e) {
            e.preventDefault();
            const nama = document.getElementById('menu-nama').value;
            const kat = document.getElementById('menu-kategori').value;
            const harga = parseInt(document.getElementById('menu-harga').value);
            daftarMenu.push({ id: Date.now(), nama, kategori: kat, harga });
            kirimDataKeCloud(); tutupModalMenu(); document.getElementById('form-menu').reset();
        }
        
        function hapusMenu(id) { 
            if(confirm("Hapus menu ini dari daftar?")) {
                daftarMenu = daftarMenu.filter(m => m.id !== id); kirimDataKeCloud(); 
            }
        }

        function renderRekapUbahUrutanUtama() {
            const c = document.getElementById('container-rekap-urutan-utama'); c.innerHTML = '';
            let totalPiutang = 0;
            bukuUtang.forEach(p => {
                totalPiutang += p.totalUtang;
                c.innerHTML += `
                    <div class="p-3 bg-white border rounded-xl flex justify-between items-center shadow-xs">
                        <div>
                            <span class="font-bold text-slate-800 block">${p.nama}</span>
                            <button onclick="bukaDetailRekap('${p.nama}')" class="text-[10px] text-emerald-600 font-bold underline mt-1"><i class="fa-solid fa-clock-rotate-left mr-1"></i>Lihat Riwayat Bon</button>
                        </div>
                        <span class="font-black text-sm ${p.totalUtang > 0 ? 'text-rose-600' : 'text-slate-400'}">${formatRupiah(p.totalUtang)}</span>
                    </div>`;
            });
            document.getElementById('total-utang-warung').innerText = formatRupiah(totalPiutang);
        }

        // KONTROL POPUP DETAIL REKAP & PELUNASAN
        function bukaDetailRekap(nama) {
            targetNamaRekap = nama;
            document.getElementById('modal-rekap-title').innerText = `Riwayat Bon — ${nama}`;
            const body = document.getElementById('modal-rekap-body');
            body.innerHTML = '';
            
            const riwayatFilter = riwayatGlobalBarang.filter(r => r.pembeli === nama);
            if(riwayatFilter.length === 0) {
                body.innerHTML = '<div class="text-center text-slate-400 py-6 font-bold">Belum ada riwayat belanja tercatat.</div>';
            } else {
                riwayatFilter.forEach(r => {
                    const itemsText = r.listMenu.map(i => `<div>• ${i.nama} x${i.qty} (${formatRupiah(i.harga * i.qty)})</div>`).join('');
                    body.innerHTML += `
                        <div class="border p-2.5 rounded-lg bg-slate-50 border-slate-200">
                            <div class="flex justify-between font-bold text-slate-400 text-[10px] mb-1">
                                <span>📌 AMBIL BON</span>
                                <span>${r.tanggal}</span>
                            </div>
                            <div class="text-slate-700 font-medium space-y-0.5 my-1.5">${itemsText}</div>
                            <div class="text-right border-t pt-1 font-black text-rose-600 text-sm">Total: ${formatRupiah(r.nominal)}</div>
                        </div>`;
                });
            }
            document.getElementById('modal-detail-rekap').classList.remove('hidden');
        }

        function tutupModalRekap() { document.getElementById('modal-detail-rekap').classList.add('hidden'); targetNamaRekap = null; }

        function lunasiUtangPelanggan() {
            if(!targetNamaRekap) return;
            const user = bukuUtang.find(u => u.nama === targetNamaRekap);
            if(user.totalUtang <= 0) { alert('Utang pelanggan ini memang sudah lunas.'); return; }
            
            if(confirm(`Lunasi seluruh utang ${targetNamaRekap} senilai ${formatRupiah(user.totalUtang)}?`)) {
                user.totalUtang = 0;
                // Bersihkan riwayat lama khusus pelanggan ini setelah dilunasi
                riwayatGlobalBarang = riwayatGlobalBarang.filter(r => r.pembeli !== targetNamaRekap);
                kirimDataKeCloud();
                tutupModalRekap();
                alert('Utang telah berhasil dilunasi!');
            }
        }
    </script>
</body>
</html>
